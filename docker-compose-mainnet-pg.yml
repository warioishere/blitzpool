version: '3.8'

services:
  postgres:
    container_name: public-pool-postgres
    image: postgres:15-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-public_pool}"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${PG_DATABASE:-public_pool}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    volumes:
      - ./full-setup/data/mainnet/public-pool/pg:/var/lib/postgresql/data

  public-pool:
    container_name: public-pool
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${STRATUM_PORT}:${STRATUM_PORT}/tcp"
      - "127.0.0.1:${STRATUM_HIGH_DIFF_PORT:-3339}:${STRATUM_HIGH_DIFF_PORT:-3339}/tcp"
      - "127.0.0.1:${API_PORT}:${API_PORT}/tcp"
    volumes:
      - "./.env:/public-pool/.env:ro"
    environment:
      - NODE_ENV=production
      - DB_TYPE=postgres
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=${PG_USER:-postgres}
      - PG_PASSWORD=${PG_PASSWORD:-postgres}
      - PG_DATABASE=${PG_DATABASE:-public_pool}
      - PG_SSL=${PG_SSL:-false}
      - DB_RUN_MIGRATIONS=true
