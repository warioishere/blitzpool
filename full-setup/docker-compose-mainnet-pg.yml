version: '3.8'

services:
  bitcoin:
    container_name: bitcoin
    image: my-bitcoin-image:latest
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - bitcoin
    ports:
      - "127.0.0.1:8332:8332/tcp"
      - "0.0.0.0:8333:8333/tcp"
    command: >
      -printtoconsole
      -datadir=/app/data
    volumes:
      - "./data/mainnet/bitcoin:/app/data"
      - "./bitcoin-mainnet.conf:/app/data/bitcoin.conf:ro"

  postgres:
    container_name: public-pool-postgres
    image: postgres:18-alpine
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - bitcoin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-public_pool}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c max_connections=120
      -c shared_buffers=3GB
      -c effective_cache_size=6GB
      -c work_mem=32MB
      -c maintenance_work_mem=256MB
      -c wal_buffers=16MB
      -c max_wal_size=2GB
      -c min_wal_size=1GB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c autovacuum_vacuum_scale_factor=0.05
      -c autovacuum_analyze_scale_factor=0.02
      -c autovacuum_vacuum_cost_delay=2ms
      -c idle_in_transaction_session_timeout=30000
      -c log_min_duration_statement=2000
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c statement_timeout=30000
    environment:
      POSTGRES_DB: ${PG_DATABASE:-public_pool}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    volumes:
      - "./data/mainnet/public-pool/pg:/var/lib/postgresql/data"

  redis:
    container_name: public-pool-redis
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - bitcoin
    healthcheck:
      test: ["CMD", "sh", "-c", "valkey-cli ${REDIS_PASSWORD:+-a \"$$REDIS_PASSWORD\"} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Persistence: AOF + everysec fsync = max 1s of share writes lost on a
    # hard crash (well under the durability budget for a payout-bearing pool).
    # RDB snapshots stay enabled at default cadence as a faster restart path.
    #
    # Eviction policy: volatile-lru evicts only keys with an explicit TTL —
    # i.e. application cache entries (CLIENT_INFO_*, etc., set via REDIS_TTL).
    # Share/round state (groupsolo:* and pplns:*) is written without a TTL on
    # purpose, so volatile-lru never touches it. Earlier `allkeys-lru` would
    # silently evict round shares once Redis hit the maxmemory limit, which
    # would corrupt PROP-round splits and PPLNS window math.
    command: >
      valkey-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory ${REDIS_MAX_MEMORY:-1024mb}
      --maxmemory-policy volatile-lru
      --io-threads 2
      --io-threads-do-reads yes
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - "./data/mainnet/public-pool/redis:/data"

  public-pool:
    container_name: public-pool
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 4096M
    networks:
      - bitcoin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "0.0.0.0:3333:3333/tcp"
      - "0.0.0.0:3339:3339/tcp"
      - "0.0.0.0:3334:3334/tcp"
      - "0.0.0.0:3335:3335/tcp"
      # PPLNS stratum port (address-routed payouts, sliding N=4×netdiff window)
      - "0.0.0.0:3340:3340/tcp"
    volumes:
      - "./blitzpool.env:/public-pool/.env:ro"
      - "./logs:/public-pool/logs"
      - "/home/blitzpool/public-pool-keys:/app/keys"
      # Firebase Cloud Messaging (FCM) - Optional
      - "/home/blitzpool/fcm/blitzpool-d57be-firebase-adminsdk-fbsvc-6e4652c582.json:/app/fcm-key.json:ro"
      # SQLite database (for migration) - migrated to PostgreSQL on first startup, then ignored
      - "./data/mainnet/public-pool/public-pool.sqlite:/public-pool/DB/public-pool.sqlite:ro"
    environment:
      - NODE_ENV=production
      # glibc malloc tuning — reduce arena fragmentation under PG connection churn
      - MALLOC_ARENA_MAX=2
      # Database - PostgreSQL
      - DB_TYPE=postgres
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=${PG_USER:-postgres}
      - PG_PASSWORD=${PG_PASSWORD:-postgres}
      - PG_DATABASE=${PG_DATABASE:-public_pool}
      - PG_SSL=false
      - DB_RUN_MIGRATIONS=true
      - DB_MIGRATE_SQLITE_ON_BOOT=false
      # PostgreSQL connection pooling
      - PG_POOL_SIZE=10
      - PG_MAX_QUERY_TIME=30000
      - PG_ACQUIRE_TIMEOUT=60000
      - PG_IDLE_TIMEOUT=300000
      # Redis configuration
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=0
      - REDIS_TTL=600
      # Firebase Cloud Messaging (FCM) - Optional
      - FCM_SERVICE_ACCOUNT_PATH=/app/fcm-key.json

networks:
  bitcoin:
