version: '3.8'

services:
  bitcoin:
    container_name: bitcoin
    image: my-bitcoin-image:latest
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - bitcoin
    ports:
      - "127.0.0.1:8332:8332/tcp"
      - "0.0.0.0:8333:8333/tcp"
    command: >
      -printtoconsole
      -datadir=/app/data
    volumes:
      - "./data/mainnet/bitcoin:/app/data"
      - "./bitcoin-mainnet.conf:/app/data/bitcoin.conf:ro"

  public-pool:
    container_name: public-pool
    build:
      context: ..
      dockerfile: Dockerfile_pm2
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - bitcoin
    ports:
      - "0.0.0.0:3333:3333/tcp"
      - "0.0.0.0:3339:3339/tcp"
      - "0.0.0.0:3334:3334/tcp"
    volumes:
      - "./data/mainnet/public-pool:/public-pool/DB"
      - "./blitzpool.env:/public-pool/.env:ro"
      - "/home/blitzpool/public-pool-keys:/app/keys"
    environment:
      - NODE_ENV=production
    command: pm2-runtime dist/main.js -i 6   # run one worker per CPU core

networks:
  bitcoin:
