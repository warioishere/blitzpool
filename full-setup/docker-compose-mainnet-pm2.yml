version: '3.8'

services:
  bitcoin:
    container_name: bitcoin
    image: my-bitcoin-image:latest
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - bitcoin
    ports:
      - "127.0.0.1:8332:8332/tcp"
      - "0.0.0.0:8333:8333/tcp"
    command: >
      -printtoconsole
      -datadir=/app/data
    volumes:
      - "./data/mainnet/bitcoin:/app/data"
      - "./bitcoin-mainnet.conf:/app/data/bitcoin.conf:ro"

  redis:
    container_name: public-pool-redis
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - bitcoin
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - "./data/mainnet/public-pool/redis:/data"

  public-pool:
    container_name: public-pool
    build:
      context: ..
      dockerfile: Dockerfile_pm2
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bitcoin
    ports:
      - "0.0.0.0:3333:3333/tcp"
      - "0.0.0.0:3339:3339/tcp"
      - "0.0.0.0:3334:3334/tcp"
    volumes:
      - "./data/mainnet/public-pool:/public-pool/DB"
      - "./blitzpool.env:/public-pool/.env:ro"
      - "./logs:/public-pool/logs"
      - "/home/blitzpool/public-pool-keys:/app/keys"
    environment:
      - NODE_ENV=production
      # Redis configuration (Phase 2)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_TTL=600
      # PM2 configuration
      - PM2_INSTANCES=6
    command: pm2-runtime start ecosystem.config.js

networks:
  bitcoin:
