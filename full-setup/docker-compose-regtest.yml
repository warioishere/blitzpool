version: '3.8'

services:
  bitcoin-regtest:
    container_name: bitcoin-regtest
    build:
      context: ./docker/bitcoin
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - bitcoin-regtest
    ports:
      - "127.0.0.1:28332:28332/tcp"
      - "0.0.0.0:28333:28333/tcp"
    command: >
      -printtoconsole
      -datadir=/app/data
      -regtest
      -blockversion=536870912
    volumes:
      - "./data/regtest/bitcoin:/app/data"
      - "./bitcoin-regtest.conf:/app/data/bitcoin.conf:ro"

  public-pool-regtest:
    container_name: public-pool-regtest
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - bitcoin-regtest
    ports:
      - "0.0.0.0:23333:23333/tcp"
      - "0.0.0.0:23339:23339/tcp"
      - "127.0.0.1:23334:23334/tcp"
    volumes:
      - "./data/regtest/public-pool:/public-pool/DB"
      - "./public-pool-regtest.env:/public-pool/.env:ro"
      # Firebase Cloud Messaging (FCM) - Optional
      - "/home/blitzpool/fcm/blitzpool-d57be-firebase-adminsdk-fbsvc-6e4652c582.json:/app/fcm-key.json:ro"
    environment:
      - NODE_ENV=production
      # Firebase Cloud Messaging (FCM) - Optional
      - FCM_SERVICE_ACCOUNT_PATH=/app/fcm-key.json

networks:
  bitcoin-regtest:
