# condensed bitcoin config

blockmaxweight=4000000
blockreservedweight=6000
minrelaytxfee=0.00000100
mempoolfullrbf=1

# pruning setting
prune=550

#Network Settings
maxconnections=30

# allow docker IPs
rpcallowip=172.16.0.0/12
rpcallowip=127.0.0.1
zmqpubrawblock=tcp://0.0.0.0:28332

# bind docker container to 0.0.0.0:8332
rpcbind=0.0.0.0
rpcport=8332

# rpc user and password
rpcpassword=bitcoin
rpcuser=bitcoin

# enable server
server=1

[main]
[test]
rpcbind=0.0.0.0
rpcport=18332
# no additional testnet settings

[signet]
[regtest]
